name: Publish Android Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (example: v1.0.1)"
        required: true
        default: "v1.9.5"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Prepare Gradle wrapper
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager --install "platforms;android-36" "build-tools;36.1.0"

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Rename APK
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          mv app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/release/Visitas-${TAG}-release.apk"

      - name: Extract release notes
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            BEGIN{found=0}
            $0 ~ ("^## Visitas " ver) {found=1; print; next}
            found && $0 ~ "^## Visitas " {exit}
            found {print}
          ' CHANGELOG.md > release-notes.md

      - name: Publish GitHub Release (attach APK)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, 'alpha') }}
          body_path: release-notes.md
          overwrite_files: true
          fail_on_unmatched_files: true
          files: app/build/outputs/apk/release/Visitas-${{ github.event.inputs.tag || github.ref_name }}-release.apk
